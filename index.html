<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <title>Vault</title>
  <script src="webxdc.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", Roboto,
        sans-serif;
      background: #111113;
      color: #f2f2f2;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 12px;
    }

    /* ---------- entry screen ---------- */

    .entry {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 8px;
      max-width: 320px;
      margin: 0 auto;
      width: 100%;
    }
    .entry .icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
    }
    .entry h1 {
      font-size: 24px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    .input {
      width: 100%;
      padding: 14px;
      font-size: 22px;
      text-align: center;
      background: #232326;
      border: 2px solid #555;
      border-radius: 14px;
      color: white;
      font: inherit;
    }
    .input::placeholder { color: #888; }
    .input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      font-weight: 500;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font: inherit;
      transition: opacity 0.15s;
    }
    .btn:active { background: #1d4ed8; }
    .btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* ---------- vault screen ---------- */

    .vault-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .vault-header .label {
      font-size: 13px;
      color: #777;
    }
    .vault-header .number {
      font-family: ui-monospace, monospace;
      font-size: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 40vw;
    }
    .vault-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .edit-badge {
      font-size: 11px;
      color: #5eead4;
      padding: 3px 8px;
      border: 1px solid #5eead4;
      border-radius: 8px;
    }
    .lock-btn.lock-dirty {
      background: #2563eb;
      border-color: #2563eb;
      color: white;
    }
    .lock-btn {
      padding: 6px 14px;
      font-size: 13px;
      background: transparent;
      border: 1px solid #444;
      border-radius: 10px;
      color: #ddd;
      cursor: pointer;
      font: inherit;
    }
    #app textarea {
      flex: 1;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      line-height: 1.5;
      background: #1c1c1e;
      border: 1px solid #333;
      border-radius: 16px;
      color: white;
      resize: none;
      font-family: ui-monospace, SFMono-Regular, Menlo,
                   Monaco, Consolas, monospace;
    }
    #app textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .hint {
      text-align: center;
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      flex-shrink: 0;
    }

    /* ---------- file attachments ---------- */

    .file-section {
      flex-shrink: 0;
      margin-top: 8px;
    }
    .file-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #777;
      margin-bottom: 6px;
    }
    .attach-btn {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #444;
      border-radius: 8px;
      background: transparent;
      color: #ddd;
      cursor: pointer;
      font: inherit;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #1c1c1e;
      border: 1px solid #333;
      border-radius: 10px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .file-info { overflow: hidden; }
    .file-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size { font-size: 10px; color: #666; }
    .file-actions button {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
    }
    .file-actions .dl { color: #3b82f6; }
    .file-actions .del { color: #e11d48; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body></html>
