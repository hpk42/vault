name: Release Verification

on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Build production bundle
        run: pnpm run build

      - name: Download released asset
        run: gh release download ${{ github.event.release.tag_name }} --pattern "vault.xdc" --dir downloaded-asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify asset reproducibility
        run: |
          SHA_BUILT=$(sha256sum vault.xdc | cut -d' ' -f1)
          SHA_RELEASED=$(sha256sum downloaded-asset/vault.xdc | cut -d' ' -f1)
          echo "SHA of built artifact:    $SHA_BUILT"
          echo "SHA of released artifact: $SHA_RELEASED"
          if [ "$SHA_BUILT" != "$SHA_RELEASED" ]; then
            echo "::error::Release verification failed! The released vault.xdc is not reproducible."
            exit 1
          fi
          echo "Success: Released vault.xdc is reproducible and matches the source code!"
