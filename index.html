<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <title>Vault</title>
  <script src="webxdc.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", Roboto,
        sans-serif;
      background: #111113;
      color: #f2f2f2;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 12px;
    }

    /* ---------- entry screen ---------- */

    .entry {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 8px;
      max-width: 320px;
      margin: 0 auto;
      width: 100%;
    }
    .entry .icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
    }
    .entry h1 {
      font-size: 24px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    .input {
      width: 100%;
      padding: 14px;
      font-size: 22px;
      text-align: center;
      background: #232326;
      border: 2px solid #555;
      border-radius: 14px;
      color: white;
      font: inherit;
    }
    .input::placeholder { color: #888; }
    .input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      font-weight: 500;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font: inherit;
      transition: opacity 0.15s;
    }
    .btn:active { background: #1d4ed8; }
    .btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* ---------- vault screen ---------- */

    .vault-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .vault-header .label {
      font-size: 13px;
      color: #777;
    }
    .vault-header .number {
      font-family: ui-monospace, monospace;
      font-size: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 40vw;
    }
    .vault-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .lock-btn {
      padding: 6px 14px;
      font-size: 13px;
      background: transparent;
      border: 1px solid #444;
      border-radius: 10px;
      color: #ddd;
      cursor: pointer;
      font: inherit;
    }
    #guest-frame {
      flex: 1;
      width: 100%;
      border: 1px solid #333;
      border-radius: 12px;
      background: white;
    }
    #guest-error {
      flex-shrink: 0;
      max-height: 30vh;
      overflow-y: auto;
      background: #3a1010;
      border: 1px solid #a33;
      border-radius: 8px;
      color: #f99;
      font-size: 11px;
      font-family: monospace;
      padding: 6px 8px;
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-all;
      user-select: text;
    }
    .hint {
      text-align: center;
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      flex-shrink: 0;
    }

  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body></html>
